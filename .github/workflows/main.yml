name: Build and Release Patched TickTick

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL to the official TickTick DMG"
        default: "https://download.ticktick.app/download/mac/TickTick_8.0.60_468.dmg"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Patched TickTick
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Patch Script
        run: |
          chmod +x patch.sh prepare.sh
          ./patch.sh "${{ inputs.app_url }}"

      - name: Package to DMG
        run: |
          hdiutil create -volname "TickTick (Patched)" -srcfolder build/TickTick.patched.app -ov -format UDZO build/TickTick.patched.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Patched TickTick (${{ github.run_number }})
          files: build/TickTick.patched.dmg
          draft: true

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
